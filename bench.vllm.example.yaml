# Same config works for vLLM and SGLang. Change backend_type/base_url/metrics.url.
backend_type: "vllm"        # vllm | sglang | auto
base_url: "http://127.0.0.1:36999"   # WITHOUT /v1
metrics_url: "http://127.0.0.1:36999/metrics"
model: "calls-model"
api_key: null

system_path: "./system.txt"
messages_dir: "./messages"          # folder with 100+ *.json conversations
output_jsonl: "./results/backend_bench.jsonl"
overwrite_output: true

request_timeout_sec: 300
http_connection_limit: 0             # 0 = unlimited
progress_every: 20
seed: 12345
max_itl_samples_in_memory: 1000000

# Used only to build test prompts of a target size.
# The runner tries /tokenize with chat messages first. If the backend rejects it,
# it falls back to a rough char-based estimate and prints a warning.
tokenizer:
  enabled: true
  mode: "endpoint"                   # endpoint | rough
  add_generation_prompt: true
  timeout_sec: 60
  chat_template_kwargs:
    enable_thinking: false

metrics:
  enabled: true
  url: "http://127.0.0.1:36999/metrics"
  # Optional. Leave empty for a single-model server.
  # Use it if /metrics exposes multiple models and you want only one.
  label_filter: {}
  # Example:
  # label_filter:
  #   model_name: "calls-model"

# Common OpenAI-compatible chat payload fields.
# For raw HTTP, chat_template_kwargs is sent directly in the request body.
payload:
  max_tokens: 128
  temperature: 0.0
  top_p: 1.0
  stream: true
  stream_options:
    include_usage: true
  chat_template_kwargs:
    enable_thinking: false

runs:
  # Main sweep: system + real dialogue prefix until prompt reaches target_tokens.
  - name: "ctx_sweep"
    mode: "fixed_context"
    target_tokens: [7000, 10000, 15000, 20000, 26000]
    concurrency: [1, 5, 10, 15, 20, 30, 40, 50, 65, 80, 100]
    total_requests: 100

  # Full dialogue emulation: every prefix ending with a user message becomes a request.
  # This simulates actual incremental calls through the whole conversation.
  - name: "dialog_replay"
    mode: "dialog_replay"
    concurrency: [20, 50]
    total_requests: 500
    request_after_roles: ["user"]

  # TTS/interactive latency probe: short answer after a 7k+ prompt.
  - name: "short_answer_7k"
    mode: "fixed_context"
    target_tokens: 7000
    concurrency: [20, 50]
    total_requests: 100
    payload:
      max_tokens: 32

  # Decode pressure probe: same context, longer answer.
  - name: "decode_7k_512"
    mode: "fixed_context"
    target_tokens: 7000
    concurrency: 20
    total_requests: 100
    payload:
      max_tokens: 512

  # Mixed profile: one JSONL row contains a weighted mixture of different request types.
  # This is useful when you want a single "traffic-like" run instead of many isolated sweeps.
  # Counts are deterministic: total_requests is split by weights.
  - name: "mixed_callcenter"
    mode: "mix"
    concurrency: [20, 50, 80]
    total_requests: 500
    shuffle: true
    components:
      - name: "dialog_turns"
        mode: "dialog_replay"
        weight: 5
        request_after_roles: ["user"]
        payload:
          max_tokens: 128

      - name: "ctx_7k_short"
        mode: "fixed_context"
        weight: 3
        target_tokens: 7000
        payload:
          max_tokens: 32

      - name: "ctx_15k_normal"
        mode: "fixed_context"
        weight: 1
        target_tokens: 15000
        payload:
          max_tokens: 128

      - name: "ctx_26k_short"
        mode: "fixed_context"
        weight: 1
        target_tokens: 26000
        payload:
          max_tokens: 32

